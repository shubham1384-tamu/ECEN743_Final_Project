# === General Training Configuration ===
training:
  out_dir: "train/outputs"
  train_bool: true
  use_rag: false          # skip RAG to avoid OpenAI embedding dependency
  lora_rank: 64
  chat_template: "qwen-2.5"
  # ros_host_ip removed — no longer needed in gym mode
  f1tenth_map: "vegas"    # F1TENTH map to use
  f1tenth_steps: 50       # gym steps per rollout

# === Weights & Biases ===
wandb:
  enabled: true
  project: "mpc_grpo"
  api_key: "${WANDB_API_KEY}"

# === Model and Tokenizer ===
model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  load_in_4bit: true
  max_seq_length: 2048
  fast_inference: true
  gpu_memory_utilization: 0.5
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407

# === GRPO ===
grpo:
  use_vllm: true
  learning_rate: 0.000005
  adam_beta1: 0.9
  adam_beta2: 0.99
  weight_decay: 0.1
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  logging_steps: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  num_generations: 4
  max_prompt_length: 500
  max_completion_length: 750
  max_steps: 750
  save_steps: 250
  max_grad_norm: 0.1

# === Dataset ===
dataset:
  mem_nb: 5
  shuffle: true
  baseline_rmse: 0.5      # lateral deviation baseline in meters on vegas map

# === Evaluation ===
evaluation:
  evaluation_on: false    # periodic eval disabled — MPCTester requires ROS

# === Reward weights ===
reward:
  w1: 1.0   # Rtask       — always on (paper baseline)
  w2: 0.0   # Rstability  — set to 1.0 to enable
  w3: 0.0   # Rsafety     — set to 1.0 to enable
  w4: 0.0   # Refficiency — set to 1.0 to enable
  w6: 1.0   # Rfmt        — always on (paper baseline)

# === Tokens ===
tokens:
  huggingfacehub: "${HUGGINGFACEHUB_API_TOKEN}"
  openai: "${OPENAI_API_TOKEN}"
  wandb: "${WANDB_API_KEY}"